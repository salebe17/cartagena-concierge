name: Hourly Calendar Sync

# DISABLED: Schedule removed to stop automated runs.
# To re-enable, uncomment the schedule block below.
on:
  # schedule:
  #   - cron: '0 * * * *' # Every hour
  workflow_dispatch: # Manual trigger only

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Sync Endpoint
        run: |
          curl -X GET "${{ secrets.PRODUCTION_URL }}/api/cron/sync-calendars" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
